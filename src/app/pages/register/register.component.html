<div class="register-page">
  <p-card header="Registro de usuario" styleClass="register-card">
    <p>Completa el formulario para crear tu cuenta.</p>
    <ng-template pTemplate="footer">
      <p-button label="Registrarse" icon="pi pi-check" />
      <p-button label="Volver al login" routerLink="/login" icon="pi pi-arrow-left" severity="secondary" [text]="true" styleClass="ml-2" />
    </ng-template>
  </p-card>
</div>
