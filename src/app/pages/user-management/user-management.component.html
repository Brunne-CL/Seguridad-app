<p-toast position="top-center" />
<div class="user-mgmt">
  <div class="header">
    <p-button icon="pi pi-arrow-left" [text]="true" (onClick)="back()" />
    <h1>Gestión de usuarios</h1>
    <p-button label="Crear usuario" icon="pi pi-user-plus" styleClass="btn-uteq-primary" (onClick)="openCreate()" />
  </div>

  <p-card header="Usuarios (perfil por permisos, no roles)">
    <p-table [value]="users()" [tableStyle]="{ 'min-width': '50rem' }">
      <ng-template pTemplate="header">
        <tr>
          <th>Usuario</th>
          <th>Email</th>
          <th>Nombre</th>
          <th>Permisos</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-u>
        <tr>
          <td>{{ u.usuario }}</td>
          <td>{{ u.email }}</td>
          <td>{{ u.nombreCompleto }}</td>
          <td>
            <span class="perms-list">{{ u.permissions.length }} permisos</span>
          </td>
          <td>
            <p-button icon="pi pi-key" [text]="true" (onClick)="openPerms(u.id)" title="Editar permisos" />
            @if (u.id !== currentUserId()) {
              <p-button icon="pi pi-trash" severity="danger" [text]="true" (onClick)="deleteUser(u.id)" />
            }
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</div>

<p-dialog
  header="Crear usuario"
  [visible]="showCreateDialog()"
  (visibleChange)="showCreateDialog.set($event)"
  [modal]="true"
  [style]="{ width: '400px' }"
>
  <form [formGroup]="createForm" (ngSubmit)="createUser()">
    <div class="field mb-2">
      <label>Usuario</label>
      <input pInputText formControlName="usuario" class="w-full" />
    </div>
    <div class="field mb-2">
      <label>Email</label>
      <input pInputText formControlName="email" type="email" class="w-full" />
    </div>
    <div class="field mb-2">
      <label>Contraseña</label>
      <input pInputText formControlName="password" type="password" class="w-full" />
    </div>
    <div class="field mb-2">
      <label>Nombre completo</label>
      <input pInputText formControlName="nombreCompleto" class="w-full" />
    </div>
    <div class="field mb-2">
      <label>Dirección</label>
      <input pInputText formControlName="direccion" class="w-full" />
    </div>
    <div class="field mb-2">
      <label>Teléfono</label>
      <input pInputText formControlName="telefono" class="w-full" />
    </div>
    <div class="field mb-2">
      <label>Fecha nacimiento</label>
      <p-datePicker formControlName="fechaNacimiento" dateFormat="dd/mm/yy" [showIcon]="true" styleClass="w-full" />
    </div>
    <div class="flex gap-2 mt-2">
      <p-button type="submit" label="Crear" icon="pi pi-check" styleClass="btn-uteq-primary" />
      <p-button type="button" label="Cancelar" severity="secondary" (onClick)="showCreateDialog.set(false)" />
    </div>
  </form>
</p-dialog>

<p-dialog
  header="Permisos del usuario"
  [visible]="showPermsDialog()"
  (visibleChange)="showPermsDialog.set($event)"
  [modal]="true"
  [style]="{ width: '420px' }"
>
  @if (permsForm) {
    <form [formGroup]="permsForm" (ngSubmit)="savePerms()">
      <div class="perms-grid">
        @for (p of permissionList; track p) {
          <div class="perm-row">
            <p-checkbox [formControlName]="p" [inputId]="p" [binary]="true" />
            <label [for]="p">{{ permissionLabel(p) }}</label>
          </div>
        }
      </div>
      <div class="flex gap-2 mt-2">
        <p-button type="submit" label="Guardar permisos" icon="pi pi-check" styleClass="btn-uteq-primary" />
        <p-button type="button" label="Cerrar" severity="secondary" (onClick)="showPermsDialog.set(false)" />
      </div>
    </form>
  }
</p-dialog>
